name: CI

# Reconcile-Ops continuous integration.
# On every push / PR: install deps, generate the seeded synthetic data, and run
# the test suite (unit tests + ground-truth precision/recall checks).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 is the target runtime; 3.12 guards against accidental use of
        # very new syntax and keeps the project installable on common runners.
        python-version: ["3.12", "3.14"]

    env:
      # Make the reconcile_ops package importable from src/ without installing.
      PYTHONPATH: src

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data
        run: python data/generate.py --n 5000 --seed 42 --outdir data

      - name: Run test suite
        run: pytest -q
